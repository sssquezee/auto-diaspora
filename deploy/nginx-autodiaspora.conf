# Auto Diaspora — nginx vhost. Lives at /etc/nginx/sites-available/autodiaspora.com
# (symlinked into sites-enabled). Independent of the existing secondbid vhost.
#
# HTTP-only to start. After DNS resolves to this box, run:
#   certbot --nginx -d autodiaspora.com -d www.autodiaspora.com
# and certbot adds the :443 TLS server + http→https redirect in place.

server {
    listen 80;
    listen [::]:80;
    server_name autodiaspora.com www.autodiaspora.com;

    client_max_body_size 20m;  # listing photo uploads

    # Next.js sends large response headers (RSC payloads, big Set-Cookie on
    # auth — Supabase session cookies are ~3 KB). nginx's default 4–8 KB
    # proxy buffers overflow → "upstream sent too big header" → 502.
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    # Security headers (these were in vercel.json; on a VPS nginx owns them).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # Webhooks / sensitive routes — never cache.
    location ~ ^/api/(mollie|telegram|account/export) {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
